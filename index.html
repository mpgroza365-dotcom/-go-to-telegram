<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحقق...</title>
    <style>
        body { font-family: 'Cairo', sans-serif; text-align: center; background: #0f0f0f; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { max-width: 400px; width: 100%; padding: 20px; background: #1a1a1a; border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 20px rgba(255, 204, 0, 0.1); }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ffcc00; margin-bottom: 15px; object-fit: cover; }
        h2 { color: #ffcc00; margin-bottom: 10px; font-size: 20px; }
        p { font-size: 15px; margin-bottom: 20px; color: #ccc; }
        #progress-bar { width: 100%; height: 6px; background: #333; border-radius: 5px; overflow: hidden; margin-bottom: 20px; }
        #progress { width: 0%; height: 100%; background: #ffcc00; transition: width 3s linear; }
        .btn { display: none; padding: 14px 20px; background: #ffcc00; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 16px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <!-- الصورة المرفوعة -->
    <img src="IMG_20260718_234923_834.jpg" alt="Logo" class="logo">
    
    <h2>التحقق من الاتصال</h2>
    <p id="status">جاري تأمين الرابط وتجهيز الانتقال للقناة...</p>
    
    <div id="progress-bar"><div id="progress"></div></div>
    
    <a href="https://www.effectivecpmnetwork.com/g5kxs26r?key=a4a30dc387f7432db0109c60fbaa20f8" 
       target="_blank" id="ad-link" class="btn" onclick="showFinalBtn()">اضغط هنا للوصول إلى القناة</a>
</div>

<script>
    window.onload = function() {
        document.getElementById('progress').style.width = '100%';
        setTimeout(() => {
            document.getElementById('status').innerText = "تم التحقق بنجاح، اضغط للمتابعة.";
            document.getElementById('ad-link').style.display = 'block';
        }, 3000);
    };

    function showFinalBtn() {
        setTimeout(() => {
            window.location.href = "https://t.me/+jInL6dOv_uo0YTM0";
        }, 500);
    }
</script>
</body>
</html>
