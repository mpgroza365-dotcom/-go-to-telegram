<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تجهيز طلبك...</title>
    <style>
        body { font-family: 'Cairo', sans-serif; text-align: center; background: #0f0f0f; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { max-width: 400px; width: 100%; padding: 30px; background: #1a1a1a; border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        h2 { color: #ffcc00; margin-bottom: 10px; }
        p { font-size: 16px; margin-bottom: 20px; line-height: 1.6; }
        #progress-bar { width: 100%; height: 8px; background: #333; border-radius: 5px; overflow: hidden; margin: 20px 0; }
        #progress { width: 0%; height: 100%; background: #ffcc00; transition: width 4s linear; }
        .btn { display: none; padding: 15px 30px; background: #ffcc00; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 18px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>فيلمك جاهز للمشاهدة!</h2>
    <p id="status">جاري فحص الروابط وتجهيز صفحة التحميل...</p>
    
    <div id="progress-bar"><div id="progress"></div></div>
    
    <a href="https://www.effectivecpmnetwork.com/g5kxs26r?key=a4a30dc387f7432db0109c60fbaa20f8" 
       target="_blank" id="ad-link" class="btn" onclick="showFinalBtn()">اضغط للمتابعة ومشاهدة الفيلم</a>
</div>

<script>
    // تفعيل شريط التحميل فوراً
    window.onload = function() {
        document.getElementById('progress').style.width = '100%';
        setTimeout(() => {
            document.getElementById('status').innerText = "تمت العملية بنجاح! اضغط أدناه للمشاهدة.";
            document.getElementById('ad-link').style.display = 'block';
        }, 4000);
    };

    function showFinalBtn() {
        setTimeout(() => {
            window.location.href = "https://t.me/+jInL6dOv_uo0YTM0";
        }, 1000);
    }
</script>
</body>
</html>
