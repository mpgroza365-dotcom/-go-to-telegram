<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تخطي الإعلان للوصول للقناة</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .container { max-width: 400px; margin: 100px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #skip-btn { display: none; padding: 15px 30px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>الرجاء الانتظار...</h2>
    <p id="msg">يتم تحميل المحتوى، يرجى دعمنا بالنقر على الإعلان لإظهار رابط القناة.</p>
    
    <!-- رابط الإعلان -->
    <a href="https://www.effectivecpmnetwork.com/g5kxs26r?key=a4a30dc387f7432db0109c60fbaa20f8" 
       target="_blank" 
       onclick="showSkip()">اضغط هنا لدعمنا وتحميل الصفحة</a>
    
    <br><br>
    <button id="skip-btn" onclick="goToChannel()">تخطي الإعلان والذهاب للقناة</button>
</div>

<script>
    function showSkip() {
        document.getElementById('msg').innerText = "شكراً لدعمك! الآن يمكنك التخطي.";
        document.getElementById('skip-btn').style.display = 'inline-block';
    }

    function goToChannel() {
        window.location.href = "https://t.me/+jInL6dOv_uo0YTM0";
    }
</script>

</body>
</html>
